<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .page-wrapper {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 40px 16px;
        }
        .panel {
            width: 100%;
            max-width: 520px;
            background-color: #121212;
            border: 1px solid #d4af37;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }
        .header {
            padding: 36px 20px;
            background-color: #000000;
            border-bottom: 1px solid #333333;
        }
        .logo-text {
            color: #d4af37;
            font-size: 26px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
            font-weight: 300;
        }
        .logo-subtext {
            color: #aaaaaa;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: lowercase;
            font-style: italic;
        }
        .body {
            padding: 40px 28px;
        }
        .status {
            display: inline-grid;
            place-items: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            margin-bottom: 18px;
            background-color: {% if success %}#d4af37{% else %}#3a1515{% endif %};
            color: {% if success %}#000000{% else %}#ffb3b3{% endif %};
            font-weight: bold;
            font-size: 22px;
        }
        h1 {
            color: #d4af37;
            font-weight: 300;
            font-size: 24px;
            margin: 0 0 14px;
        }
        p {
            color: #e0e0e0;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 28px;
        }
        .btn {
            display: inline-block;
            border-radius: 4px;
            padding: 14px 24px;
            background-color: #d4af37;
            color: #000000;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 14px;
            text-decoration: none;
        }
        .footer {
            text-align: center;
            padding: 24px;
            background-color: #050505;
            color: #666666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <main class="page-wrapper">
        <section class="panel">
            <div class="header">
                <h2 class="logo-text">Accessoires_Exclusifs</h2>
                <div class="logo-subtext">redefine your style</div>
            </div>
            <div class="body">
                <div class="status">{% if success %}OK{% else %}!{% endif %}</div>
                <h1>{{ title }}</h1>
                <p>{{ message }}</p>
                <a class="btn" href="{{ frontend_url }}">Retour vers l'application</a>
            </div>
            <div class="footer">
                &copy; {% now "Y" %} Accessoires Exclusifs. Tous droits reserves.
            </div>
        </section>
    </main>
</body>
</html>
