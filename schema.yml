          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: 30, 50, 75, 100 ml
        prix_unitaire:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        prix_promotionnel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        prix_actuel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        genre_cible:
          $ref: '#/components/schemas/GenreCibleEnum'
        intensite:
          oneOf:
          - $ref: '#/components/schemas/IntensiteEnum'
          - $ref: '#/components/schemas/BlankEnum'
        notes_tete:
          type: string
          maxLength: 300
        notes_coeur:
          type: string
          maxLength: 300
        notes_fond:
          type: string
          maxLength: 300
