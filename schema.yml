  /api/v1/lab/essences/:
    get:
      operationId: v1_lab_essences_list
      description: "\nRetourne la liste paginée de toutes les essences **actives**.\n\nLes
        essences sont les matières premières utilisées pour la création de parfums
        DIY\ndans le laboratoire.\n\n**Filtres disponibles** :\n- Par tags : `famille_olfactive`,
        `humeur`, `saison`, `occasion`, `signe_astrologique`, `moment_journee`\n-
        Par caractéristiques : `genre`, `intensite`\n- Par prix : `prix_min`, `prix_max`
        (prix par ml en FCFA)\n- Par stock : `stock_min` (en ml)\n        "
      summary: Liste des essences
      parameters:
      - in: query
        name: famille_olfactive
        schema:
          type: string
        description: 'Famille olfactive (ex: Floral, Boisé, Musqué)'
      - in: query
        name: genre
        schema:
          type: string
          enum:
          - femme
          - homme
          - mixte
        description: Genre cible
      - in: query
        name: humeur
        schema:
          type: string
        description: 'Humeur compatible (ex: Romantique, Détendu)'
      - in: query
        name: intensite
        schema:
          type: string
          enum:
          - forte
          - légère
          - moyenne
          - très forte
        description: Intensité de l'essence
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: moment_journee
        schema:
          type: string
        description: 'Moment de la journée (ex: Matin, Soir, Nuit)'
      - in: query
        name: occasion
        schema:
          type: string
        description: 'Occasion (ex: Soirée, Quotidien)'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Tri (ex: prix_par_ml, -stock_ml_total_reel, nom)'
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: prix_max
        schema:
          type: number
        description: Prix maximum par ml en FCFA
      - in: query
        name: prix_min
        schema:
          type: number
        description: Prix minimum par ml en FCFA
      - in: query
        name: saison
        schema:
          type: string
        description: 'Saison compatible (ex: Été, Hiver)'
      - in: query
        name: search
        schema:
          type: string
        description: Recherche textuelle dans nom, description, fournisseur
      - in: query
        name: signe_astrologique
        schema:
          type: string
        description: 'Signe astrologique compatible (ex: Lion, Verseau, Scorpion)'
      - in: query
        name: stock_min
        schema:
          type: number
        description: Stock minimum disponible en ml
      - in: query
        name: tags
        schema:
          type: string
        description: 'IDs de tags séparés par virgule (ex: ?tags=1,3,5)'
      tags:
      - Essences
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
