  /api/v1/shop/flacons/:
    get:
      operationId: v1_shop_flacons_list
      description: "\nRetourne la liste paginée de tous les flacons **actifs**.\n\nLes
        flacons sont utilisés pour le conditionnement des parfums personnalisés\ncréés
        dans le laboratoire DIY.\n\n> ⚠️ Un flacon dont le stock est **inférieur ou
        égal au seuil d'alerte**\n> ne peut pas être sélectionné pour une commande.\n\n**Filtres
        disponibles** :\n- Par type : `type_flacon` (ID) ou `type_nom` (nom partiel)\n-
        Par contenance : `contenance_ml` (exacte), `contenance_min`, `contenance_max`\n-
        Par stock : `stock_min`, `stock_max`, `en_stock`\n- Par caractéristiques :
        `matiere`, `couleur`\n        "
      summary: Liste des flacons
      parameters:
      - in: query
        name: contenance_max
        schema:
          type: integer
        description: Contenance maximum en ml
      - in: query
        name: contenance_min
        schema:
          type: integer
        description: Contenance minimum en ml
      - in: query
        name: contenance_ml
        schema:
          type: integer
        description: 'Contenance exacte en ml (ex: 30, 50, 75, 100)'
      - in: query
        name: couleur
        schema:
          type: string
        description: 'Couleur du flacon (ex: Transparent, Noir, Ambré)'
      - in: query
        name: en_stock
        schema:
          type: boolean
        description: '`true` = commandable (stock > seuil) | `false` = bloqué (stock
          ≤ seuil)'
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: matiere
        schema:
          type: string
        description: 'Matière du flacon (ex: Verre, Plastique, Aluminium)'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Tri (ex: contenance_ml, -stock_quantite, prix_unitaire)'
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Recherche textuelle dans nom, matière, couleur
      - in: query
        name: stock_max
        schema:
          type: integer
        description: Quantité maximum en stock
      - in: query
        name: stock_min
        schema:
          type: integer
        description: Quantité minimum en stock
      - in: query
        name: type_flacon
        schema:
          type: integer
        description: ID du type de flacon
      - in: query
        name: type_nom
        schema:
          type: string
