  /api/v1/shop/parfums/:
    get:
      operationId: v1_shop_parfums_list
      description: "\nRetourne la liste paginée de tous les parfums **actifs** du
        catalogue.\n\n**Pagination** : 50 résultats par page. Utilisez `?page=2` pour
        naviguer.\n\n**Filtres disponibles** :\n- Par tags : `famille_olfactive`,
        `humeur`, `saison`, `occasion`\n- Par caractéristiques : `genre`, `intensite`,
        `contenance_ml`\n- Par prix : `prix_min`, `prix_max`\n- Par statut : `est_nouveau`,
        `est_bestseller`\n\n**Tri** : `?ordering=prix_unitaire` ou `?ordering=-date_creation`\n\n**Recherche
        textuelle** : `?search=rose` (cherche dans nom, description, notes)\n        "
      summary: Liste des parfums
      parameters:
      - in: query
        name: contenance_ml
        schema:
          type: integer
        description: 'Contenance exacte en ml (ex: 30, 50, 75, 100)'
      - in: query
        name: est_bestseller
        schema:
          type: boolean
        description: Filtrer les bestsellers uniquement
      - in: query
        name: est_nouveau
        schema:
          type: boolean
        description: Filtrer les nouveautés uniquement
      - in: query
        name: famille_olfactive
        schema:
          type: string
        description: 'Famille olfactive (ex: Floral, Boisé, Oriental, Aquatique)'
      - in: query
        name: genre
        schema:
          type: string
          enum:
          - femme
          - homme
          - mixte
        description: Genre cible
      - in: query
        name: humeur
        schema:
          type: string
        description: 'Humeur compatible (ex: Romantique, Détendu, Énergique)'
      - in: query
        name: intensite
        schema:
          type: string
          enum:
          - forte
          - légère
          - moyenne
          - très forte
        description: Intensité du parfum
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Nombre de résultats par page (défaut: 50, max: 100)'
      - in: query
        name: occasion
        schema:
          type: string
        description: 'Occasion (ex: Soirée, Bureau, Sport, Quotidien)'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Tri des résultats (ex: prix_unitaire, -prix_unitaire, nom, -date_creation)'
      - in: query
        name: page
        schema:
          type: integer
        description: 'Numéro de page (défaut: 1)'
      - in: query
        name: prix_max
        schema:
          type: integer
        description: Prix maximum en FCFA
      - in: query
        name: prix_min
        schema:
          type: integer
        description: Prix minimum en FCFA
      - in: query
        name: saison
        schema:
          type: string
        description: 'Saison compatible (ex: Été, Hiver, Printemps, Automne)'
      - in: query
        name: search
        schema:
          type: string
        description: Recherche textuelle dans nom, description et notes olfactives
      - in: query
        name: tags
        schema:
          type: string
        description: 'IDs de tags séparés par virgule (ex: ?tags=1,3,5)'
      tags:
      - Parfums
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedParfumPublicListList'
              examples:
                ParfumsFlorauxFéminins:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - famille_olfactive: Floral
                      genre: femme
                  summary: Filtrer par famille olfactive et genre
                ParfumsDansUneFourchetteDePrix:
                  value:
                    count: 123
                    next: http://api.example.org/accounts/?page=4
                    previous: http://api.example.org/accounts/?page=2
                    results:
                    - prix_min: 15000
                      prix_max: 50000
                  summary: Filtrer par prix
          description: ''
