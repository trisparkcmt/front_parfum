          type: array
          items:
            type: string
          readOnly: true
        humeurs_compatibles:
          type: array
          items:
            type: string
          readOnly: true
        occasions:
          type: array
          items:
            type: string
          readOnly: true
        saisons_compatibles:
          type: array
          items:
            type: string
          readOnly: true
        est_nouveau:
          type: boolean
        est_bestseller:
          type: boolean
        image_principale:
          type: string
          maxLength: 255
        stock_quantite:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        date_creation:
