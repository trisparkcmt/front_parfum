openapi: 3.0.3
info:
  title: Accessoire Exclusif API
  version: 1.0.0
  description: API pour la plateforme de parfums et accessoires exclusifs
paths:
  /api/v1/auth/admin/commandes/{id}/affecter-livreur/:
    post:
      operationId: v1_auth_admin_commandes_affecter_livreur_create
      description: Assigne une commande à un livreur actif.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/livraisons/:
    get:
      operationId: v1_auth_admin_livraisons_retrieve
      description: Suivi global de toutes les livraisons pour l'administrateur.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/livreurs/:
    get:
      operationId: v1_auth_admin_livreurs_retrieve
      description: Liste complète de tous les livreurs (pour affectation ou gestion
        admin).
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/livreurs/{id}/:
    patch:
      operationId: v1_auth_admin_livreurs_partial_update
      description: Modifie le profil ou le statut d'un livreur.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/livreurs/promote/:
    post:
      operationId: v1_auth_admin_livreurs_promote_create
      description: Crée un profil Livreur à partir d'un Client existant via son ID
        utilisateur (user_id).
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/payouts/:
    get:
      operationId: v1_auth_admin_payouts_retrieve
      description: Liste de tous les virements (payouts) initiés par l'admin avec
        pagination
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/prestataires/:
    get:
      operationId: v1_auth_admin_prestataires_retrieve
      description: Liste de tous les prestataires avec filtrage par statut
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/prestataires/{id}/payout/:
    post:
      operationId: v1_auth_admin_prestataires_payout_create
      description: Initiation d'un virement mobile money vers un prestataire par l'administrateur
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/prestataires/{id}/update/:
    patch:
      operationId: v1_auth_admin_prestataires_update_partial_update
      description: Modifier le taux de commission ou le statut d'un prestataire actif
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/prestataires/validate/{id}/:
    patch:
      operationId: v1_auth_admin_prestataires_validate_partial_update
      description: |-
        Endpoint pour valider un prestataire (Réservé à l'Admin).
        L'admin doit fournir le taux_commission.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/stats/global/:
    get:
      operationId: v1_auth_admin_stats_global_retrieve
      description: Statistiques financières pour le dashboard admin
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/users/:
    get:
      operationId: v1_auth_admin_users_retrieve
      description: Liste paginée et recherchable de tous les utilisateurs
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/admin/users/{id}/toggle-status/:
    patch:
      operationId: v1_auth_admin_users_toggle_status_partial_update
      description: Bloquer ou débloquer un utilisateur (is_active)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/google/:
    post:
      operationId: v1_auth_google_create
      description: |-
        class used for social authentications
        example usage for facebook with access_token
        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
        -------------

        example usage for facebook with code

        -------------
        from allauth.socialaccount.providers.facebook.views import FacebookOAuth2Adapter
        from allauth.socialaccount.providers.oauth2.client import OAuth2Client

        class FacebookLogin(SocialLoginView):
            adapter_class = FacebookOAuth2Adapter
            client_class = OAuth2Client
            callback_url = 'localhost:8000'
        -------------
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SocialLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SocialLogin'
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialLogin'
          description: ''
  /api/v1/auth/livreur/dashboard/:
    get:
      operationId: v1_auth_livreur_dashboard_retrieve
      description: |-
        Dashboard pour le livreur connecté et actif.
        Affiche son statut, son nombre de livraisons et ses livraisons actives.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/livreur/livraisons/:
    get:
      operationId: v1_auth_livreur_livraisons_retrieve
      description: Liste paginée de toutes les livraisons assignées au livreur connecté.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/livreur/livraisons/{id}/statut/:
    post:
      operationId: v1_auth_livreur_livraisons_statut_create
      description: |-
        Mise à jour du statut d'une livraison attribuée au livreur connecté.
        Actions autorisées : 'livrer', 'echouer'.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Vue obsolète pour empêcher l'utilisation du login générique non
        sécurisé.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: |-
        Calls Django logout method and delete the Token object
        assigned to the current User object.

        Accepts/Returns nothing.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      description: Permet à l'utilisateur connecté de voir ou modifier son profil.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: v1_auth_me_update
      description: Permet à l'utilisateur connecté de voir ou modifier son profil.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: v1_auth_me_partial_update
      description: Permet à l'utilisateur connecté de voir ou modifier son profil.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/change-email/:
    post:
      operationId: v1_auth_me_change_email_create
      description: Demande le changement d'email via le flux de confirmation allauth.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/mobile/login/:
    post:
      operationId: v1_auth_mobile_login_create
      description: |-
        Vue de connexion spécifique pour Mobile / Clients API :
        - Retourne les jetons d'accès et de rafraîchissement directement dans le corps JSON de la réponse.
        - Supprime les cookies de la réponse pour ne pas polluer l'application mobile.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailOrTelephoneLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailOrTelephoneLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailOrTelephoneLogin'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailOrTelephoneLogin'
          description: ''
  /api/v1/auth/password/change/:
    post:
      operationId: v1_auth_password_change_create
      description: |-
        Calls Django Auth SetPasswordForm save method.

        Accepts the following POST parameters: new_password1, new_password2
        Returns the success/fail message.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomPasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomPasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomPasswordChange'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/v1/auth/password/reset/:
    post:
      operationId: v1_auth_password_reset_create
      description: |-
        Calls Django Auth PasswordResetForm save method.

        Accepts the following POST parameters: email
        Returns the success/fail message.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordReset'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordReset'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordReset'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordReset'
          description: ''
  /api/v1/auth/password/reset/confirm/:
    post:
      operationId: v1_auth_password_reset_confirm_create
      description: |-
        Password reset e-mail link is confirmed, therefore
        this resets the user's password.

        Accepts the following POST parameters: token, uid,
            new_password1, new_password2
        Returns the success/fail message.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestAuthDetail'
          description: ''
  /api/v1/auth/payout/webhook/:
    get:
      operationId: v1_auth_payout_webhook_retrieve
      description: Webhook public appelé par Monetbil pour notifier du statut final
        d'un virement (succès/échec)
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_auth_payout_webhook_create
      description: Webhook public appelé par Monetbil pour notifier du statut final
        d'un virement (succès/échec)
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/prestataire/apply/:
    post:
      operationId: v1_auth_prestataire_apply_create
      description: Endpoint pour qu'un utilisateur postule en tant que prestataire.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/prestataire/dashboard/:
    get:
      operationId: v1_auth_prestataire_dashboard_retrieve
      description: |-
        Dashboard pour le prestataire connecté (ou pour l'admin via ?prestataire_id=ID).
        Si l'admin fait la requête sans prestataire_id, il accède aux infos de tous les prestataires confondus.
        Affiche le solde, le code promo, les stats et l'historique récent.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/prestataire/historique/:
    get:
      operationId: v1_auth_prestataire_historique_retrieve
      description: |-
        Historique financier complet (crédits/débits) pour le prestataire connecté
        (ou pour l'admin via ?prestataire_id=ID).
        Si l'admin fait la requête sans prestataire_id, il accède à l'historique de tous les prestataires.
        Supporte la pagination et le filtrage par type_operation.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/prestataire/payouts/:
    get:
      operationId: v1_auth_prestataire_payouts_retrieve
      description: |-
        Liste de toutes les demandes de virement initiées pour le prestataire connecté
        (ou pour l'admin via ?prestataire_id=ID).
        Si l'admin fait la requête sans prestataire_id, il accède aux virements de tous les prestataires.
        Supporte la pagination.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/registration/:
    post:
      operationId: v1_auth_registration_create
      description: |-
        Registers a new user.

        Accepts the following POST parameters: username, email, password1, password2.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomRegister'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomRegister'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomRegister'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomRegister'
          description: ''
  /api/v1/auth/registration/resend-email/:
    post:
      operationId: v1_auth_registration_resend_email_create
      description: |-
        Resends another email to an unverified email.

        Accepts the following POST parameter: email.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendEmailVerification'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendEmailVerification'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendEmailVerification'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendEmailVerification'
          description: ''
  /api/v1/auth/registration/verify-email/:
    post:
      operationId: v1_auth_registration_verify_email_create
      description: |-
        Verifies the email associated with the provided key.

        Accepts the following POST parameter: key.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyEmail'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmail'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/token/verify/:
    post:
      operationId: v1_auth_token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v1/auth/user/:
    get:
      operationId: v1_auth_user_retrieve
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - v1
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    put:
      operationId: v1_auth_user_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDetails'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDetails'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDetails'
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetails'
          description: ''
    patch:
      operationId: v1_auth_user_partial_update
      description: |-
        Reads and updates UserModel fields
        Accepts GET, PUT, PATCH methods.

        Default accepted fields: username, first_name, last_name
        Default display fields: pk, username, email, first_name, last_name
        Read-only fields: pk, email

        Returns UserModel fields.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserDetails'
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
